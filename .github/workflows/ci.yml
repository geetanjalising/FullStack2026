name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: |
          cd frontened
          npm install

      - name: Build frontend
        run: |
          cd frontened
          npm run build

      - name: Install backend dependencies
        run: |
          cd backened
          npm install

  
  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t backend ./backened

      - name: Build Frontend Docker Image
        run: docker build -t frontend ./frontened